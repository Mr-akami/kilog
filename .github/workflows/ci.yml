name: CI

on:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build first so generated artifacts (bundled client, dist/ for the CLI
      # bin) are available to tests and to the type-check step.
      - run: pnpm build

      # Format + lint + type-check (via Vite+) — fails if anything is off.
      - run: pnpm check

      - run: pnpm test
