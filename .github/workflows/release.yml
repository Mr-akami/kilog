name: Release

# Everything in this workflow is manual.
#
#   1. Actions → "Release" → Run workflow → action: "release-please"
#      → release-please opens / updates a Release PR with CHANGELOG + bumps.
#   2. Review and merge that PR — this creates tags + GitHub Releases.
#   3. Actions → "Release" → Run workflow → action: "publish" + tag
#      → builds from that tag and `pnpm -r publish` to npm.
on:
  workflow_dispatch:
    inputs:
      action:
        description: Which step to run
        required: true
        type: choice
        options:
          - release-please
          - publish
      tag:
        description: Tag to publish (only when action = publish, e.g. v0.1.0)
        required: false
        type: string

jobs:
  release-please:
    if: inputs.action == 'release-please'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    if: inputs.action == 'publish'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm -r publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
